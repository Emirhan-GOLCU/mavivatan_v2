ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true  # İDA sadece su yüzeyinde gider, Z eksenini (uçmayı) iptal et
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. SENSÖR: ZED 2i'nin IMU'su (Pusula ve ivme)
    imu0: /zed/zed_node/imu/data
    imu0_config: [false, false, false, # X, Y, Z pozisyon (kullanma)
                  true,  true,  true,  # Roll, Pitch, Yaw açıları (KULLAN)
                  false, false, false, # X, Y, Z hız (kullanma)
                  true,  true,  true,  # Açısal hız (KULLAN)
                  true,  true,  true]  # İvme (KULLAN)

    # 2. SENSÖR: Pixhawk GPS
    odom0: /mavros/global_position/local
    odom0_config: [true,  true,  false, # X, Y pozisyon (KULLAN), Z(iptal)
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]